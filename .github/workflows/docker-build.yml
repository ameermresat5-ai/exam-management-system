name: Docker Build

on:
  push:
  pull_request:

jobs:
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t exam-backend:ci -f backend/Dockerfile .

      - name: Build frontend image
        run: docker build -t exam-frontend:ci ./frontend